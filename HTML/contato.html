<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <form>
        <input type="text" name="nome" placeholder="Nome"/><br>
        <input type="email" name="email" placeholder="Email"/><br>
        <input type="tel" name="telefone" placeholder="(xx) xxx xxx xxx"/><br>
        <input type="number" name="idade" placeholder="Idade"/><br>
        <input type="url" name="linkedin" placeholder="Linkedin URL"/><br>
        Urgência<input type="range" name="urgencia" min="0" max="100" step="0.1"/><br>
        <input type="checkbox" name="dia-da-semana" value="2"/> Segunda-feira
        <input type="checkbox" name="dia-da-semana" value="4"/> Terça-feira
        <input type="checkbox" name="dia-da-semana" value="6"/> Sexta-feira <br>
        <input type="radio" name="horario" value="manha"/>Manhã
        <input type="radio" name="horario" value="tarde"/>Tarde
        <input type="radio" name="horario" value="noite"/>Noite <br>
        <textarea cols="50" rows="10"></textarea><br>

        <input list="cidade" name="cidade"/>
        <datalist id="cidade">
            <option value="Blumenau">Blumenau</option>
            <option value="Florianópolis">Florianópolis</option>
            <option value="Joinville">Joinville</option>
        </datalist><br>
        <button type="button">Outra ação</button>
        <button type="reset">Limpar</button>
        <button type="submit">Enviar Mensagem</button>
    </form>
</body>
</html>
