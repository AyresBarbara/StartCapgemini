    <title>Condiconal Aninhada</title>

    <!-- JAVASCRIPT-->
     <script>
        var media = 8.6;

        //Condicional

        if(media == 10){
            alert("Parabéns!!");
        }else if(media >=9){
            alert("Ótimo!");
        }else if(media >=8){
            alert("Bom!");
        }else if(media >=7){
            alert("Na média!");
        }else if(media >= 5){
            alert("Ta em recuperação!");
        }else{
            alert("Reprovado!")
        }
     </script>
