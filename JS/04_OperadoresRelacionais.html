<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores  Relacionais</title>

    <!-- JAVASCRIPT-->
     <script>
        //MAIOR
        window.alert(5>4);
        //MENOR
        window.alert(5<4);
        //IGUAL
        window.alert(5==4);
        //MAIOR ou igual
        window.alert(5>=5);
        //MENOR OU IGUAL
        window.alert(8<=12);
        //DIFERENTE
        window.alert(8 != 9);
     </script>
</head>

</body>
</html>
